<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="tile1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="tile2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="tile3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="tile4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5B21B6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 外框圆角背景 -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- 2x2 四个方块（代表分组概念） -->
  <rect x="14" y="14" width="14" height="14" rx="5" fill="url(#tile1)"/>
  <rect x="36" y="14" width="14" height="14" rx="5" fill="url(#tile2)"/>
  <rect x="14" y="36" width="14" height="14" rx="5" fill="url(#tile3)"/>
  <rect x="36" y="36" width="14" height="14" rx="5" fill="url(#tile4)"/>

  <!-- 高光点缀 -->
  <circle cx="24" cy="24" r="3" fill="white" opacity="0.35"/>
  <circle cx="46" cy="46" r="3" fill="white" opacity="0.35"/>
</svg>
